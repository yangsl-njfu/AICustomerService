# Graduation marketplace business pack

business_id: graduation-marketplace
business_name: 毕业设计商城
business_type: ecommerce

api:
  base_url: ""
  api_key: ${BUSINESS_API_KEY}
  timeout: 30

adapter:
  type: ecommerce
  class: adapters.EcommerceAdapter

features:
  order_query: true
  product_search: true
  refund_service: true
  logistics_tracking: false
  coupon_system: false

intent_handlers:
  问答: qa_flow
  工单: ticket_flow
  推荐: topic_advisor
  商品咨询: product_inquiry
  购买指导: purchase_guide
  订单查询: order_query
  文档分析: document_analysis
  售后服务: aftersales_flow

intent_classifier:
  labels:
    - 问答
    - 工单
    - 推荐
    - 商品咨询
    - 购买指导
    - 订单查询
    - 文档分析
    - 售后服务
  rules:
    推荐:
      - 推荐
      - 帮我选
      - 选题
      - 毕设题目
      - 适合我
      - 不知道选什么
      - 个性化推荐
      - 根据我的浏览
    售后服务:
      - 退款
      - 退货
      - 换货
      - 售后
      - 申请退款
    订单查询:
      - 订单
      - 物流
      - 发货
      - 快递
      - 查订单
      - 订单号
    购买指导:
      - 怎么购买
      - 如何购买
      - 支付
      - 付款
      - 下单
      - 购买流程
    工单:
      - 投诉
      - 报错
      - bug
      - 故障
      - 打不开
      - 不能用
    商品咨询:
      - 技术栈
      - 用什么
      - 这个项目
      - 详情
      - 功能
      - 包含什么
    问答:
      - 你好
      - hello
      - hi
      - 平台
      - 介绍
      - 是什么
  examples:
    - message: 帮我推荐几个 Java 毕设项目
      intent: 推荐
    - message: 我的订单到哪了
      intent: 订单查询
    - message: 这个项目用什么技术栈
      intent: 商品咨询
    - message: 我要退款
      intent: 售后服务
    - message: 这个平台是做什么的
      intent: 问答

custom_intents:
  - name: graduation_project_inquiry
    description: 用户询问毕业设计项目
    keywords:
      - 毕业设计
      - 项目
      - 作品
      - 源码
      - 代码

  - name: tech_stack_query
    description: 用户询问技术栈
    keywords:
      - 技术栈
      - 用什么开发
      - 框架
      - 语言
      - 技术

plugins:
  - name: query_order
    enabled: true
    groups: [default]
    description: 查询订单

  - name: search_products
    enabled: true
    groups: [default]
    description: 搜索商品

  - name: get_user_info
    enabled: true
    groups: [default]
    description: 获取用户信息

  - name: check_inventory
    enabled: true
    groups: [default]
    description: 检查库存

  - name: get_logistics
    enabled: true
    groups: [default]
    description: 查询物流

  - name: calculate_price
    enabled: true
    groups: [default]
    description: 计算价格

  - name: get_personalized_recommendations
    enabled: true
    groups: [default, topic_advisor]
    description: 个性化推荐

  - name: search_projects
    enabled: true
    groups: [topic_advisor]
    description: 搜索项目

  - name: get_project_detail
    enabled: true
    groups: [topic_advisor]
    description: 查询项目详情

  - name: compare_projects
    enabled: true
    groups: [topic_advisor]
    description: 比较项目

  - name: check_tech_stack_match
    enabled: true
    groups: [topic_advisor]
    description: 技术栈匹配

knowledge_base:
  collections:
    - name: graduation_projects
      description: 毕业设计项目知识库
    - name: tech_docs
      description: 技术文档知识库
    - name: product_catalog
      description: 商品目录知识库

prompts:
  system_prompt: |
    你是毕业设计商城的 AI 客服助手。
    你的任务是帮助用户找到合适的毕业设计项目，并回答与商城、订单和购买相关的问题。
  function_calling_system_prompt: |
    你是毕业设计商城的工具调度助手。
    当问题涉及订单、价格、库存、用户信息或推荐数据时，优先调用工具。
    如果问题不需要查数据，直接自然回答。
  topic_advisor_system_prompt: |
    你是毕业设计商城的智能选题助手 Agent。
    你的目标是帮助用户完成选题、项目对比、技术栈匹配和个性化推荐。

    规则：
    1. 简单需求直接给结果，不要过度调用工具。
    2. 如果用户需要帮助决策，再做多轮搜索和比较。
    3. 最终回复必须简洁，给出明确推荐理由。
    4. 优先推荐预算合适、难度匹配的项目。
  greeting: |
    您好，我是毕业设计商城的 AI 助手，很高兴为您服务。
    我可以帮您推荐项目、查询订单、解答技术问题和提供购买指导。
  error_message: |
    抱歉，我遇到了一些问题。请稍后再试，或联系人工客服。

llm:
  temperature: 0.7
  max_tokens: 2000
  model: deepseek-chat
